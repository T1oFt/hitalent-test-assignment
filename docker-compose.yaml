services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hitalent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hitalent"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  app:
    build:
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    command: >
      sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/hitalent
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: