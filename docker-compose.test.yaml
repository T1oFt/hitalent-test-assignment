services:
  postgres_test:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hitalent_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hitalent_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    build:
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres_test:5432/hitalent_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres_test:5432/hitalent_test
    depends_on:
      postgres_test:
        condition: service_healthy
    command: >
      sh -c "pytest tests/ -v"
